<mat-sidenav-container class="dashboard-shell">
  
  <mat-sidenav mode="side" opened disableClose class="sidebar">
    <div class="brand-block text-center mt-4 mb-5">
      <h2 style="color: #243aa7; font-weight: bold; margin: 0;">Connect <span style="color: #7c56ff;">+</span></h2>
    </div>

    <nav class="menu-list">
      @for (item of menuItems; track item.label) {
        <a [routerLink]="item.route" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="menu-link">
          <mat-icon>{{ item.icon }}</mat-icon>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>
  </mat-sidenav>

  <mat-sidenav-content class="content">
    
    <mat-toolbar class="toolbar px-4">
      <h1 style="margin: 0; font-size: 1.5rem; color: #16235f; font-weight: 600;">Visão Geral</h1>
    </mat-toolbar>

    <div class="container mt-5">
      <div class="row g-4">
        
        <div class="col-md-6 col-lg-4">
          <div class="card shadow-sm border-0" style="border-radius: 20px;">
            <div class="card-body text-center py-5">
              <mat-icon style="font-size: 48px; height: 48px; width: 48px; color: #243aa7;">business</mat-icon>
              <h4 class="mt-3 text-secondary">Empresas</h4>
              <h2 class="display-5 fw-bold" style="color: #16235f;">{{ totalEmpresasCadastradas }}</h2>
            </div>
          </div>
        </div>

        <div class="col-md-6 col-lg-4">
          <div class="card shadow-sm border-0" style="border-radius: 20px;">
            <div class="card-body text-center py-5">
              <mat-icon style="font-size: 48px; height: 48px; width: 48px; color: #7c56ff;">people</mat-icon>
              <h4 class="mt-3 text-secondary">Usuários Ativos</h4>
              <h2 class="display-5 fw-bold" style="color: #16235f;">{{ usuariosAtivos }}</h2>
            </div>
          </div>
        </div>

      </div>
    </div>

  </mat-sidenav-content>
</mat-sidenav-container>
