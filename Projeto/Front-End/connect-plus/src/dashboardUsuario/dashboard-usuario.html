<div class="dashboard-usuario-shell">
  <div class="ambient ambient-left"></div>
  <div class="ambient ambient-right"></div>
  <div class="dot-grid dot-grid-top"></div>
  <div class="dot-grid dot-grid-bottom"></div>

  <aside class="sidebar">
    <div class="sidebar-brand">
      <h1>Connect<span>+</span></h1>
      <div class="brand-line"></div>
    </div>

    <nav class="sidebar-nav" aria-label="Modulos do usuario">
      @for (item of menuItems; track item.label) {
        <button
          type="button"
          class="sidebar-link"
          [class.is-active]="item.active"
        >
          <mat-icon>{{ item.icon }}</mat-icon>
          <span>{{ item.label }}</span>
        </button>
      }
    </nav>
  </aside>

  <main class="dashboard-content">
    <header class="hero-card">
      <div class="hero-copy">
        <span class="eyebrow">Workspace do usuario</span>
        <h2>Connect <span>+</span></h2>
        <div class="hero-line"></div>
      </div>

      <article class="profile-card">
        <div class="profile-avatar">{{ currentUser().initials }}</div>
        <span class="eyebrow">Perfil</span>
        <strong>{{ currentUser().name }}</strong>
        <span class="profile-role">{{ currentUser().role }}</span>
        <span class="profile-email">{{ currentUser().email }}</span>
      </article>
    </header>

    <section class="tab-content-card">
      @if (home(); as home) {
        <div class="section-header">
          <span class="eyebrow">Home ativa</span>
          <h3>{{ home.title }}</h3>
          <p>{{ home.description }}</p>
        </div>

      

        <div class="backend-ready-panel">
        </div>
      }
    </section>
  </main>
</div>
