<div class="layout-loja">
  <main class="conteudo-loja">
    <div class="topo-loja">
      <h1>Loja</h1>
    </div>

    <div class="area-produtos">
      <div class="card-produto">
        <div class="imagem-produto fundo-black-roxo">
          <span>Black Purple</span>
        </div>
        <h3>Fundo Black</h3>
        <p>Tema escuro com detalhes em roxo</p>
        <span class="preco">100 XP</span>
        <button (click)="comprar('Fundo Black', 100)">Comprar</button>
      </div>

      <div class="card-produto">
        <div class="imagem-produto fundo-dourado-branco">
          <span>Golden White</span>
        </div>
        <h3>Fundo Dourado</h3>
        <p>Tema dourado com detalhes em branco</p>
        <span class="preco">150 XP</span>
        <button (click)="comprar('Fundo Dourado', 150)">Comprar</button>
      </div>

      <div class="card-produto">
        <div class="imagem-produto fundo-azul-neon">
          <span>Blue Neon</span>
        </div>
        <h3>Fundo Azul Neon</h3>
        <p>Tema moderno com detalhes claros</p>
        <span class="preco">200 XP</span>
        <button (click)="comprar('Fundo Azul Neon', 200)">Comprar</button>
      </div>
    </div>
  </main>
</div>
