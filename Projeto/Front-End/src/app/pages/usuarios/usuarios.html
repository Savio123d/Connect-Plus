<div class="layout-usuarios">
  <app-sidebar></app-sidebar>

  <section class="area-usuarios">
    <header class="topo-usuarios">
      <h1>Visualização de Usuários</h1>
    </header>

    <main class="conteudo-usuarios">
      <div *ngIf="carregando" class="alert alert-light border mt-3">
        Carregando usuários...
      </div>

      <div *ngIf="erro" class="alert alert-danger mt-3">
        {{ erro }}
      </div>

      <div *ngIf="!carregando && !erro" class="tabela-card mt-3">
        <table class="table table-hover mb-0">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nome</th>
              <th>E-mail</th>
              <th>Status</th>
            </tr>
          </thead>

          <tbody>
            <tr *ngFor="let usuario of usuarios">
              <td>{{ usuario.id }}</td>
              <td>{{ usuario.nome }}</td>
              <td>{{ usuario.email }}</td>
              <td>{{ usuario.status }}</td>
            </tr>

            <tr *ngIf="usuarios.length === 0">
              <td colspan="4" class="text-center text-muted py-4">
                Nenhum usuário cadastrado.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </section>

  <aside class="acoes-usuarios">
    <div class="botoes-acoes">
      <button class="btn btn-outline-primary btn-usuario">Editar</button>
      <button class="btn btn-primary btn-usuario">Novo</button>
    </div>
  </aside>
</div>
