
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/connectplus}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}

livekit.url=${LIVEKIT_URL:ws://localhost:7880}
livekit.api-key=${LIVEKIT_API_KEY:devkey}
livekit.api-secret=${LIVEKIT_API_SECRET:secret}

springdoc.swagger-ui.enabled=true

logging.level.conne.connect.connect=DEBUG
