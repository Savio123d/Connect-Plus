
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}
spring.datasource.read-url=${SPRING_DATASOURCE_READ_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}}
spring.datasource.read-username=${SPRING_DATASOURCE_READ_USERNAME:${SPRING_DATASOURCE_USERNAME:postgres}}
spring.datasource.read-password=${SPRING_DATASOURCE_READ_PASSWORD:${SPRING_DATASOURCE_PASSWORD:123456}}

spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200,http://localhost:5173,http://127.0.0.1:5173,http://localhost:[*],http://127.0.0.1:[*]}

aws.region=${AWS_REGION:sa-east-1}
aws.s3.bucket=${AWS_S3_BUCKET:}
aws.access-key=${AWS_ACCESS_KEY_ID:}
aws.secret-key=${AWS_SECRET_ACCESS_KEY:}
aws.s3.max-image-size-bytes=${AWS_S3_MAX_IMAGE_SIZE_BYTES:5242880}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

livekit.url=${LIVEKIT_URL:ws://localhost:7880}
livekit.api-key=${LIVEKIT_API_KEY:devkey}
livekit.api-secret=${LIVEKIT_API_SECRET:secret}

springdoc.swagger-ui.enabled=true

logging.level.conne.connect.connect=DEBUG

app.frontend.url=${APP_FRONTEND_URL:https://connectplus.app.br}
mercadopago.api-base-url=${MERCADOPAGO_API_BASE_URL:https://api.mercadopago.com}
mercadopago.access-token=${MERCADOPAGO_ACCESS_TOKEN:}
mercadopago.assinatura.back-url=${MERCADOPAGO_ASSINATURA_BACK_URL:${app.frontend.url}/login}
mercadopago.assinatura.frequency=${MERCADOPAGO_ASSINATURA_FREQUENCY:1}
mercadopago.assinatura.frequency-type=${MERCADOPAGO_ASSINATURA_FREQUENCY_TYPE:months}
mercadopago.assinatura.reason-prefix=${MERCADOPAGO_ASSINATURA_REASON_PREFIX:Connect+ Premium}
mercadopago.planos.premium.valor=${MERCADOPAGO_PREMIUM_VALOR:49.90}
mercadopago.planos.premium.max-usuarios=${MERCADOPAGO_PREMIUM_MAX_USUARIOS:50}
mercadopago.planos.gratuito.max-usuarios=${CONNECTPLUS_GRATUITO_MAX_USUARIOS:5}
