
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}


spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://*.vercel.app,https://connectplus.app.br}

aws.region=${AWS_REGION:sa-east-1}
aws.s3.bucket=${AWS_S3_BUCKET:connectplusapp}
aws.access-key=${AWS_ACCESS_KEY_ID:}
aws.secret-key=${AWS_SECRET_ACCESS_KEY:}
aws.s3.max-image-size-bytes=${AWS_S3_MAX_IMAGE_SIZE_BYTES:5242880}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

livekit.url=${LIVEKIT_URL:ws://localhost:7880}
livekit.api-key=${LIVEKIT_API_KEY:devkey}
livekit.api-secret=${LIVEKIT_API_SECRET:secret}


logging.level.root=INFO
logging.level.conne.connect.connect=INFO
