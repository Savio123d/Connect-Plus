
spring.application.name=Connect+

spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}


server.port=${PORT:8080}

spring.datasource.driver-class-name=org.postgresql.Driver


spring.jpa.open-in-view=false

spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

spring.jpa.properties.hibernate.default_batch_fetch_size=16

# Assinatura HS256 do token de sessao. Em producao, defina APP_SECURITY_TOKEN_SECRET
# com um segredo forte de no minimo 32 caracteres.
app.security.token.secret=${APP_SECURITY_TOKEN_SECRET:connect-plus-segredo-dev-hs256-min-32-caracteres!}
app.security.token.validade-horas=${APP_SECURITY_TOKEN_VALIDADE_HORAS:12}
