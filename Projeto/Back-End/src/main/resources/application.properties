spring.application.name=Connect+

# Porta: o Railway injeta a variavel PORT em runtime; cai para 8080 localmente.
server.port=${PORT:8080}

# Banco de dados (Neon em producao). Os valores padrao apos ":" sao usados
# apenas no ambiente local; em producao defina as variaveis de ambiente:
#   SPRING_DATASOURCE_URL=jdbc:postgresql://<host-neon>/<db>?sslmode=require
#   SPRING_DATASOURCE_USERNAME=<usuario>
#   SPRING_DATASOURCE_PASSWORD=<senha>
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/connect_plus}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:connect_plus_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:7894561230}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update

spring.flyway.enabled=false

# Origens liberadas para CORS / WebSocket (separadas por virgula).
# Em producao adicione o dominio da Vercel via APP_CORS_ALLOWED_ORIGINS, ex.:
#   APP_CORS_ALLOWED_ORIGINS=https://connectplus.app.br,https://www.connectplus.app.br,https://*.vercel.app
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:*,http://127.0.0.1:*,http://connectplus.local:*}
